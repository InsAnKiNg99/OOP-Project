{% extends "Base.html" %}
{% block content %}
<h2>Admission</h2>
<form action="/submit" method="POST">
    <div class="input-group"><label>Select Program</label><input type="text" name="program" placeholder="e.g. BS Computer Science" required></div>
    <div class="input-group"><label>Semester</label><input type="number" name="semester" value="1"></div>
    <button class="btn">Submit Application</button>
    <div class="step-text">Final Step</div>
</form>
{% endblock %}
